name: JARVIS API CI

on:
  push:
    paths:
      - "apps/api/**"
      - ".github/workflows/jarvis-api-ci.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/jarvis-api-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pip install "poetry>=1.8,<2"
      - name: Install dependencies
        run: poetry install --no-interaction
      # Full suite includes Phase 8 knowledge graph, safety/drift, and sandbox benchmark guards.
      - name: Pytest
        run: poetry run pytest -q
      - name: Ruff (optional)
        continue-on-error: true
        run: pip install "ruff>=0.6,<1" && ruff check app tests
